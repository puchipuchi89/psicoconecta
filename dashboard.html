<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #e0f7ff, #f7f0ff);
        }

        h1 {
            text-align: center;
            margin-top: 20px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        #status, #user {
            text-align: center;
            color: #444;
        }

        /* BOTONES */
        .tab-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .tab-buttons button {
            padding: 10px 15px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #6c63ff;
            color: white;
            transition: 0.2s;
        }

        .tab-buttons button:hover {
            transform: scale(1.05);
            background: #5848e5;
        }

        /* CARDS */
        .tab {
            display: none;
            margin-top: 20px;
            padding: 20px;
            border-radius: 15px;
            background: white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .active {
            display: block;
        }

        /* FEED */
        .feed-box {
            text-align: center;
            padding: 40px;
            color: #777;
            font-size: 18px;
        }

        ul {
            padding-left: 20px;
        }

        button.logout {
            display: block;
            margin: 30px auto;
            padding: 10px 15px;
            border: none;
            border-radius: 10px;
            background: #ff4d6d;
            color: white;
            cursor: pointer;
        }

        button.logout:hover {
            background: #e63e5c;
        }

    </style>
</head>

<body>

<h1>Bienvenido 🎉</h1>

<p id="status">Cargando sesión...</p>
<p id="user"></p>

<div class="container">

    <!-- BOTONES -->
    <div class="tab-buttons">
        <button onclick="openTab('feedTab')">🏠 Feed</button>
        <button onclick="openTab('resultadoTab')">🧠 Resultado</button>
        <button onclick="openTab('respuestasTab')">📋 Mis respuestas</button>
    </div>

    <!-- FEED -->
    <div id="feedTab" class="tab active">
        <h3>Feed</h3>
        <div class="feed-box">📭 Feed vacío</div>
    </div>

    <!-- RESULTADO -->
    <div id="resultadoTab" class="tab">
        <h3>Resultado psicológico</h3>
        <p id="resultado">Analizando...</p>
    </div>

    <!-- RESPUESTAS -->
    <div id="respuestasTab" class="tab">
        <h3>Tus respuestas</h3>
        <ul id="respuestas"></ul>
    </div>

</div>

<button class="logout" onclick="logout()">Cerrar sesión</button>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCHyqyi3cBQRm_Z9xeYDxQQa0BGTB8n1HQ",
  authDomain: "psicoconecta-a507d.firebaseapp.com",
  projectId: "psicoconecta-a507d",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let unsubscribe = null;

// ---------------- TABS ----------------
function openTab(tabId) {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.getElementById(tabId).classList.add("active");
}

// ---------------- ANALISIS ----------------
function analizarCorriente(respuestas) {

    let score = {
        psicoanalitica: 0,
        tcc: 0,
        humanista: 0,
        sistemica: 0,
        gestalt: 0,
        conductual: 0,
        familiar: 0,
        integrativa: 0
    };

    const text = respuestas.join(" ").toLowerCase();

    if (text.includes("historia") || text.includes("pasado") || text.includes("análisis") || text.includes("duelo")) {
        score.psicoanalitica += 2;
    }

    if (text.includes("soluciones") || text.includes("herramientas") || text.includes("ejercicios prácticos") || text.includes("ansiedad")) {
        score.tcc += 2;
    }

    if (text.includes("crecimiento personal") || text.includes("autoestima") || text.includes("emocional")) {
        score.humanista += 2;
    }

    if (text.includes("familia") || text.includes("pareja") || text.includes("relación")) {
        score.sistemica += 2;
    }

    if (text.includes("presente") || text.includes("aquí") || text.includes("ahora")) {
        score.gestalt += 2;
    }

    if (text.includes("conducta") || text.includes("hábitos")) {
        score.conductual += 2;
    }

    if (text.includes("crianza") || text.includes("hogar")) {
        score.familiar += 2;
    }

    let max = Math.max(...Object.values(score));
    let top = Object.keys(score).filter(k => score[k] === max);

    if (top.length > 1 || max === 0) {
        return "🔄 Integrativa: combinación de varios enfoques";
    }

    const resultados = {
        psicoanalitica: "🧠 Psicoanalítica",
        tcc: "🧩 Cognitivo-Conductual",
        humanista: "🌱 Humanista",
        sistemica: "👥 Sistémica",
        gestalt: "🎯 Gestalt",
        conductual: "⚙️ Conductual",
        familiar: "🏠 Familiar",
        integrativa: "🔄 Integrativa"
    };

    return resultados[top[0]];
}

// ---------------- AUTH ----------------
auth.onAuthStateChanged(user => {

    const status = document.getElementById("status");
    const lista = document.getElementById("respuestas");
    const resultado = document.getElementById("resultado");

    if (user) {

        status.innerText = "Cargando datos...";
        document.getElementById("user").innerText = user.email;

        if (unsubscribe) unsubscribe();

        unsubscribe = db.collection("usuarios").doc(user.uid)
            .onSnapshot(doc => {

                lista.innerHTML = "";

                if (doc.exists) {
                    const data = doc.data();
                    const respuestas = data.respuestas || [];

                    respuestas.forEach((r, i) => {
                        const li = document.createElement("li");
                        li.innerText = "Pregunta " + (i + 1) + ": " + r;
                        lista.appendChild(li);
                    });

                    resultado.innerText = analizarCorriente(respuestas);

                } else {
                    lista.innerHTML = "<li>No hay datos</li>";
                }

                status.innerText = "";
            });

    } else {
        window.location.href = "index.html";
    }
});

// ---------------- LOGOUT ----------------
function logout() {
    auth.signOut().then(() => {
        window.location.href = "index.html";
    });
}
</script>

</body>
</html>
