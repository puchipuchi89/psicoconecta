<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
</head>
<body>

<h1>Bienvenido 🎉</h1>
<p id="user"></p>

<h3>Tus respuestas:</h3>
<ul id="respuestas"></ul>

<button onclick="logout()">Cerrar sesión</button>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
console.log("SCRIPT CARGADO");

const firebaseConfig = {
  apiKey: "AIzaSyCHyqyi3cBQRm_Z9xeYDxQQa0BGTB8n1HQ",
  authDomain: "psicoconecta-a507d.firebaseapp.com",
  projectId: "psicoconecta-a507d",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

auth.onAuthStateChanged(async user => {
    console.log("USER:", user);

    if (user) {
        document.getElementById("user").innerText = user.email;

        try {
            const doc = await db.collection("usuarios").doc(user.uid).get();

            const lista = document.getElementById("respuestas");
            lista.innerHTML = "";

            if (doc.exists) {
                const data = doc.data();

                if (data.respuestas && data.respuestas.length > 0) {
                    data.respuestas.forEach((r, i) => {
                        const li = document.createElement("li");
                        li.innerText = "Pregunta " + (i + 1) + ": " + r;
                        lista.appendChild(li);
                    });
                } else {
                    lista.innerHTML = "<li>No hay respuestas guardadas</li>";
                }

            } else {
                lista.innerHTML = "<li>No hay datos del usuario</li>";
            }

        } catch (error) {
            console.log(error);
        }

    } else {
        window.location.href = "index.html";
    }
});

function logout() {
    auth.signOut().then(() => {
        window.location.href = "index.html";
    });
}
</script>

</body>
</html>
