<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #e0f7ff, #f7f0ff);
        }

        h1 {
            text-align: center;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        #status, #user {
            text-align: center;
            color: #444;
        }

        /* BOTONES */
        .tab-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .tab-buttons button {
            padding: 10px 15px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #6c63ff;
            color: white;
        }

        .tab {
            display: none;
            margin-top: 20px;
            padding: 20px;
            border-radius: 15px;
            background: white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .active {
            display: block;
        }

        .feed-box {
            text-align: center;
            padding: 40px;
            color: #777;
        }

        .profile-box p {
            margin: 10px 0;
        }

        ul {
            padding-left: 20px;
        }

        button.logout {
            display: block;
            margin: 30px auto;
            padding: 10px 15px;
            border: none;
            border-radius: 10px;
            background: #ff4d6d;
            color: white;
        }
    </style>
</head>

<body>

<h1>Bienvenido 🎉</h1>

<p id="status">Cargando sesión...</p>
<p id="user"></p>

<div class="container">

    <!-- BOTONES -->
    <div class="tab-buttons">
        <button onclick="openTab('feedTab')">🏠 Feed</button>
        <button onclick="openTab('resultadoTab')">🧠 Resultado</button>
        <button onclick="openTab('respuestasTab')">📋 Respuestas</button>
        <button onclick="openTab('perfilTab')">👤 Ver perfil</button>
    </div>

    <!-- FEED -->
    <div id="feedTab" class="tab active">
        <h3>Feed</h3>
        <div class="feed-box">📭 Feed vacío</div>
    </div>

    <!-- RESULTADO -->
    <div id="resultadoTab" class="tab">
        <h3>Resultado psicológico</h3>
        <p id="resultado">Analizando...</p>
    </div>

    <!-- RESPUESTAS -->
    <div id="respuestasTab" class="tab">
        <h3>Tus respuestas</h3>
        <ul id="respuestas"></ul>
    </div>

    <!-- PERFIL -->
    <div id="perfilTab" class="tab profile-box">
        <h3>👤 Perfil del usuario</h3>

        <p><strong>Nombre:</strong> <span id="p_nombre"></span></p>
        <p><strong>Correo:</strong> <span id="p_email"></span></p>
        <p><strong>Ubicación:</strong> <span id="p_ubicacion"></span></p>
        <p><strong>Motivo:</strong> <span id="p_motivo"></span></p>

        <hr>

        <p><strong>Resultado psicológico:</strong></p>
        <p id="p_resultado">Analizando...</p>
    </div>

</div>

<button class="logout" onclick="logout()">Cerrar sesión</button>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCHyqyi3cBQRm_Z9xeYDxQQa0BGTB8n1HQ",
  authDomain: "psicoconecta-a507d.firebaseapp.com",
  projectId: "psicoconecta-a507d",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let unsubscribe = null;

// ---------------- TABS ----------------
function openTab(tabId) {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.getElementById(tabId).classList.add("active");
}

// ---------------- ANALISIS ----------------
function analizarCorriente(respuestas) {

    const text = respuestas.join(" ").toLowerCase();

    if (text.includes("familia") || text.includes("relación")) return "👥 Sistémica";
    if (text.includes("soluciones") || text.includes("herramientas")) return "🧩 TCC";
    if (text.includes("crecimiento") || text.includes("autoestima")) return "🌱 Humanista";
    if (text.includes("historia") || text.includes("pasado")) return "🧠 Psicoanalítica";
    if (text.includes("presente") || text.includes("ahora")) return "🎯 Gestalt";

    return "🔄 Integrativa";
}

// ---------------- AUTH ----------------
auth.onAuthStateChanged(user => {

    const status = document.getElementById("status");

    if (user) {

        status.innerText = "Cargando datos...";
        document.getElementById("user").innerText = user.email;

        if (unsubscribe) unsubscribe();

        unsubscribe = db.collection("usuarios").doc(user.uid)
            .onSnapshot(doc => {

                if (!doc.exists) return;

                const data = doc.data();
                const respuestas = data.respuestas || [];

                // ---------------- RESPUESTAS ----------------
                const lista = document.getElementById("respuestas");
                lista.innerHTML = "";

                respuestas.forEach((r, i) => {
                    const li = document.createElement("li");
                    li.innerText = "Pregunta " + (i + 1) + ": " + r;
                    lista.appendChild(li);
                });

                // ---------------- RESULTADO ----------------
                const resultado = analizarCorriente(respuestas);
                document.getElementById("resultado").innerText = resultado;
                document.getElementById("p_resultado").innerText = resultado;

                // ---------------- PERFIL ----------------
                document.getElementById("p_nombre").innerText = data.nombre || "";
                document.getElementById("p_email").innerText = data.email || user.email;
                document.getElementById("p_ubicacion").innerText = data.ubicacion || "";
                document.getElementById("p_motivo").innerText = data.motivo || "";

                status.innerText = "";
            });

    } else {
        window.location.href = "index.html";
    }
});

// ---------------- LOGOUT ----------------
function logout() {
    auth.signOut().then(() => {
        window.location.href = "index.html";
    });
}
</script>

</body>
</html>
