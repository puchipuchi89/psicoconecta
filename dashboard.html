<!DOCTYPE html>
<html>
<head>
    <title>PsicoConecta - Dashboard</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --sage:       #4a7c6f;
            --sage-light: #6a9e90;
            --sage-dark:  #2f5248;
            --cream:      #faf8f4;
            --warm-white: #ffffff;
            --text:       #1e2d2b;
            --muted:      #6b7e7a;
            --border:     #dde8e5;
            --error:      #c0392b;
            --shadow:     0 8px 40px rgba(74,124,111,0.12);
            --shadow-sm:  0 2px 12px rgba(74,124,111,0.08);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--cream);
            min-height: 100vh;
            color: var(--text);
            padding-bottom: 60px;
        }

        /* ── HEADER ── */
        .dash-header {
            background: var(--warm-white);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
            box-shadow: var(--shadow-sm);
        }
        .logo { display: flex; align-items: center; gap: 8px; }
        .logo-icon {
            width: 36px; height: 36px; background: var(--sage);
            border-radius: 10px; display: flex; align-items: center;
            justify-content: center; font-size: 18px;
        }
        .logo-text { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--sage-dark); }
        .header-right { display: flex; align-items: center; gap: 10px; }
        .user-email {
            font-size: 12px; color: var(--muted); background: var(--cream);
            padding: 5px 10px; border-radius: 20px; border: 1px solid var(--border);
            max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .type-badge { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; }
        .type-badge.paciente  { background: #e8f4f1; color: var(--sage-dark); }
        .type-badge.psicologo { background: #ede8f4; color: #4a3c7c; }
        .btn-logout {
            background: transparent; border: 1px solid var(--border); border-radius: 8px;
            padding: 5px 12px; font-family: 'DM Sans', sans-serif; font-size: 13px;
            color: var(--muted); cursor: pointer; transition: all 0.2s;
        }
        .btn-logout:hover { border-color: var(--error); color: var(--error); }

        /* ── NAV ── */
        .nav-tabs {
            background: var(--warm-white); border-bottom: 1px solid var(--border);
            display: flex; padding: 0 16px; overflow-x: auto;
        }
        .nav-tab {
            padding: 14px 16px; border: none; background: transparent;
            font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
            color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent;
            transition: all 0.2s; white-space: nowrap; position: relative;
        }
        .nav-tab.active { color: var(--sage-dark); border-bottom-color: var(--sage); }
        .unread-dot {
            display: inline-block; width: 8px; height: 8px;
            background: #e74c3c; border-radius: 50%;
            position: absolute; top: 10px; right: 6px;
        }

        /* ── MAIN ── */
        .main { max-width: 580px; margin: 0 auto; padding: 24px 16px; }
        .tab-section { display: none; }
        .tab-section.active { display: block; }

        /* ── LOADING ── */
        #loading { text-align: center; padding: 80px 20px; color: var(--muted); }
        .spinner {
            width: 34px; height: 34px; border: 3px solid var(--border);
            border-top-color: var(--sage); border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .section-title { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--sage-dark); margin-bottom: 4px; }
        .section-sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; }

        .empty-state { text-align: center; padding: 48px 20px; color: var(--muted); }
        .empty-icon { font-size: 48px; margin-bottom: 14px; }
        .empty-state h3 { font-family: 'DM Serif Display', serif; color: var(--sage-dark); margin-bottom: 8px; }
        .empty-state p { font-size: 14px; line-height: 1.6; }

        /* ── FEED MATCH CARDS ── */
        .match-card {
            background: var(--warm-white); border-radius: 16px; padding: 20px;
            margin-bottom: 16px; border: 1px solid var(--border);
            box-shadow: var(--shadow-sm); animation: fadeUp 0.3s ease;
        }
        @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
        .match-card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
        .avatar {
            width: 48px; height: 48px; border-radius: 50%;
            background: linear-gradient(135deg, var(--sage-light), var(--sage-dark));
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; flex-shrink: 0;
        }
        .match-name { font-family: 'DM Serif Display', serif; font-size: 17px; color: var(--sage-dark); margin-bottom: 3px; }
        .compat-pill { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .c-high { background: #d4edda; color: #1a6b37; }
        .c-mid  { background: #fff3cd; color: #856404; }
        .c-low  { background: #f8d7da; color: #842029; }
        .match-label { margin-left: auto; font-size: 12px; color: #c0768a; font-weight: 600; }
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
        .detail-chip { background: var(--cream); border-radius: 8px; padding: 8px 12px; }
        .chip-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 2px; }
        .chip-val { font-size: 13px; color: var(--text); }
        .contact-row { display: flex; align-items: center; gap: 8px; padding-top: 12px; border-top: 1px solid var(--border); font-size: 13px; }
        .contact-email { color: var(--sage); font-weight: 500; }
        .btn-chat {
            margin-left: auto; padding: 7px 16px; background: var(--sage); color: white;
            border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif;
            font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.2s;
        }
        .btn-chat:hover { background: var(--sage-dark); }

        /* ── SWIPE ── */
        .swipe-wrap { display: flex; flex-direction: column; align-items: center; }
        .swipe-card {
            background: var(--warm-white); border-radius: 20px; box-shadow: var(--shadow);
            padding: 26px 22px; width: 100%; max-width: 420px; margin-bottom: 18px;
            transition: transform 0.32s ease, opacity 0.32s ease;
            touch-action: pan-y; cursor: grab;
        }
        .swipe-card:active { cursor: grabbing; }
        .swipe-card.fly-right { transform: translateX(150%) rotate(20deg) !important; opacity: 0; }
        .swipe-card.fly-left  { transform: translateX(-150%) rotate(-20deg) !important; opacity: 0; }
        .sc-top { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }
        .sc-avatar {
            width: 62px; height: 62px; border-radius: 50%;
            background: linear-gradient(135deg, var(--sage-light), var(--sage-dark));
            display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0;
        }
        .sc-name { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--sage-dark); margin-bottom: 4px; }
        .compat-bar-wrap { margin-bottom: 18px; }
        .compat-bar-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
        .compat-pct { font-weight: 700; font-size: 14px; color: var(--sage-dark); }
        .compat-bar { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
        .compat-fill { height: 100%; border-radius: 99px; transition: width 0.5s ease; }
        .sc-details { margin-bottom: 4px; }
        .sc-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 9px; font-size: 14px; }
        .sc-icon { font-size: 15px; flex-shrink: 0; }
        .sc-lbl { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.3px; margin-right: 4px; }
        .sc-val { color: var(--text); }
        .action-btns { display: flex; gap: 14px; width: 100%; max-width: 420px; }
        .btn-pass {
            flex: 1; padding: 14px; background: var(--warm-white); border: 2px solid #ffb3b3;
            border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 15px;
            font-weight: 600; color: #e05555; cursor: pointer; transition: all 0.2s;
        }
        .btn-pass:hover { background: #fff0f0; }
        .btn-like {
            flex: 1; padding: 14px; background: var(--sage); border: 2px solid var(--sage);
            border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 15px;
            font-weight: 600; color: white; cursor: pointer; transition: all 0.2s;
        }
        .btn-like:hover { background: var(--sage-dark); border-color: var(--sage-dark); }
        .swipe-hint { font-size: 12px; color: var(--muted); text-align: center; margin-top: 10px; }

        /* ── MENSAJES: LISTA ── */
        .convo-item {
            background: var(--warm-white); border-radius: 14px; padding: 16px;
            margin-bottom: 10px; border: 1px solid var(--border); cursor: pointer;
            display: flex; align-items: center; gap: 14px;
            transition: box-shadow 0.2s, border-color 0.2s;
        }
        .convo-item:hover { box-shadow: var(--shadow-sm); border-color: var(--sage-light); }
        .convo-av {
            width: 48px; height: 48px; border-radius: 50%; flex-shrink: 0;
            background: linear-gradient(135deg, var(--sage-light), var(--sage-dark));
            display: flex; align-items: center; justify-content: center; font-size: 22px;
            position: relative;
        }
        .online-dot {
            width: 11px; height: 11px; background: #2ecc71; border: 2px solid white;
            border-radius: 50%; position: absolute; bottom: 1px; right: 1px;
        }
        .convo-body { flex: 1; min-width: 0; }
        .convo-name { font-weight: 600; font-size: 14px; color: var(--text); margin-bottom: 3px; }
        .convo-preview { font-size: 13px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .convo-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
        .convo-time { font-size: 11px; color: var(--muted); }
        .unread-badge {
            background: var(--sage); color: white; border-radius: 50%;
            width: 20px; height: 20px; font-size: 11px; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
        }
        .convo-lastseen { font-size: 11px; color: var(--muted); }

        /* ── MENSAJES: CHAT VIEW ── */
        #chatView {
            display: none;
            flex-direction: column;
            height: calc(100vh - 130px);
        }
        #chatView.open { display: flex; }

        .chat-header {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 0 14px; border-bottom: 1px solid var(--border); margin-bottom: 12px;
        }
        .btn-back {
            background: transparent; border: 1px solid var(--border); border-radius: 8px;
            padding: 6px 12px; font-family: 'DM Sans', sans-serif; font-size: 13px;
            color: var(--muted); cursor: pointer; transition: all 0.2s; flex-shrink: 0;
        }
        .btn-back:hover { border-color: var(--sage); color: var(--sage); }
        .chat-header-av {
            width: 38px; height: 38px; border-radius: 50%;
            background: linear-gradient(135deg, var(--sage-light), var(--sage-dark));
            display: flex; align-items: center; justify-content: center; font-size: 18px;
            flex-shrink: 0;
        }
        .chat-header-info { flex: 1; }
        .chat-header-name { font-weight: 600; font-size: 15px; color: var(--text); }
        .chat-header-seen { font-size: 12px; color: var(--muted); }

        .chat-messages {
            flex: 1; overflow-y: auto; padding: 4px 0 12px;
            display: flex; flex-direction: column; gap: 8px;
        }
        .msg-row { display: flex; }
        .msg-row.mine  { justify-content: flex-end; }
        .msg-row.theirs { justify-content: flex-start; }
        .msg-bubble {
            max-width: 72%; padding: 10px 14px; border-radius: 16px;
            font-size: 14px; line-height: 1.45; position: relative;
        }
        .msg-row.mine .msg-bubble {
            background: var(--sage); color: white;
            border-bottom-right-radius: 4px;
        }
        .msg-row.theirs .msg-bubble {
            background: var(--warm-white); color: var(--text);
            border: 1px solid var(--border); border-bottom-left-radius: 4px;
        }
        .msg-time {
            font-size: 10px; opacity: 0.65; margin-top: 4px;
            display: block; text-align: right;
        }
        .msg-row.theirs .msg-time { text-align: left; }
        .msg-auto-tag {
            font-size: 10px; background: rgba(255,255,255,0.25);
            padding: 1px 6px; border-radius: 10px; display: inline-block; margin-bottom: 4px;
        }

        .chat-input-area {
            display: flex; gap: 10px; padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        .chat-input {
            flex: 1; padding: 11px 14px; border: 1.5px solid var(--border);
            border-radius: 22px; font-family: 'DM Sans', sans-serif; font-size: 14px;
            color: var(--text); background: var(--cream); outline: none; transition: all 0.2s;
        }
        .chat-input:focus { border-color: var(--sage-light); background: white; box-shadow: 0 0 0 3px rgba(74,124,111,0.1); }
        .btn-send {
            padding: 11px 20px; background: var(--sage); color: white; border: none;
            border-radius: 22px; font-family: 'DM Sans', sans-serif; font-size: 14px;
            font-weight: 600; cursor: pointer; transition: background 0.2s; flex-shrink: 0;
        }
        .btn-send:hover { background: var(--sage-dark); }

        /* ── PROFILE TAB ── */
        .profile-card {
            background: var(--warm-white); border-radius: 16px; padding: 26px;
            border: 1px solid var(--border); box-shadow: var(--shadow-sm);
        }
        .profile-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
        .profile-av {
            width: 70px; height: 70px; border-radius: 50%;
            background: linear-gradient(135deg, var(--sage-light), var(--sage-dark));
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; flex-shrink: 0;
        }
        .profile-name { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--sage-dark); margin-bottom: 4px; }
        .profile-section { margin-bottom: 22px; }
        .ps-title {
            font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase;
            letter-spacing: 0.6px; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border);
        }
        .pf-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: flex-start; }
        .pf-label { font-size: 12px; font-weight: 600; color: var(--muted); min-width: 130px; flex-shrink: 0; padding-top: 1px; }
        .pf-val { font-size: 14px; color: var(--text); }
        .corriente-tag { display: inline-block; background: #e8f4f1; color: var(--sage-dark); padding: 5px 12px; border-radius: 20px; font-size: 13px; font-weight: 500; }

        /* Saludo automático */
        .field-label {
            display: block; font-size: 11px; font-weight: 700; color: var(--sage-dark);
            text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px;
        }
        .saludo-textarea {
            width: 100%; padding: 10px 14px; border: 1.5px solid var(--border);
            border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px;
            color: var(--text); background: var(--cream); resize: vertical;
            min-height: 80px; outline: none; transition: all 0.2s;
        }
        .saludo-textarea:focus { border-color: var(--sage-light); background: white; box-shadow: 0 0 0 3px rgba(74,124,111,0.1); }
        .btn-save-saludo {
            margin-top: 10px; padding: 10px 20px; background: var(--sage); color: white;
            border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif;
            font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s;
        }
        .btn-save-saludo:hover { background: var(--sage-dark); }
        .save-confirm { font-size: 12px; color: var(--sage); margin-top: 6px; display: none; }

        /* ── RESPUESTAS ── */
        .resp-item { background: var(--warm-white); border-radius: 10px; padding: 12px 16px; margin-bottom: 8px; border: 1px solid var(--border); }
        .resp-lbl { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 3px; }
        .resp-val { font-size: 14px; color: var(--text); }

        /* ── MODAL ── */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.55);
            display: none; align-items: center; justify-content: center; z-index: 999;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: var(--warm-white); border-radius: 24px; padding: 40px 30px;
            text-align: center; max-width: 340px; width: 90%; animation: popIn 0.3s ease;
        }
        @keyframes popIn { from { transform: scale(0.75); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-emoji { font-size: 60px; margin-bottom: 14px; }
        .modal-box h2 { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--sage-dark); margin-bottom: 8px; }
        .modal-box p { font-size: 14px; color: var(--muted); margin-bottom: 22px; line-height: 1.5; }
        .btn-modal-primary {
            width: 100%; padding: 12px; background: var(--sage); color: white; border: none;
            border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 15px;
            font-weight: 600; cursor: pointer; margin-bottom: 10px; transition: background 0.2s;
        }
        .btn-modal-primary:hover { background: var(--sage-dark); }
        .btn-modal-secondary {
            width: 100%; padding: 11px; background: transparent; color: var(--muted);
            border: 1px solid var(--border); border-radius: 10px;
            font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer;
        }
    </style>
</head>

<body>

<!-- ── HEADER ── -->
<header class="dash-header">
    <div class="logo">
        <div class="logo-icon">🧠</div>
        <span class="logo-text">PsicoConecta</span>
    </div>
    <div class="header-right">
        <span class="user-email" id="headerEmail"></span>
        <span class="type-badge" id="typeBadge"></span>
        <button class="btn-logout" onclick="logout()">Salir</button>
    </div>
</header>

<!-- ── NAV ── -->
<nav class="nav-tabs">
    <button class="nav-tab active" id="navFeed"       onclick="openTab('feed')">🏠 Conexiones</button>
    <button class="nav-tab"        id="navMensajes"   onclick="openTab('mensajes')">💬 Mensajes</button>
    <button class="nav-tab"        id="navExplorar"   onclick="openTab('explorar')">🔍 Explorar</button>
    <button class="nav-tab"        id="navRespuestas" onclick="openTab('respuestas')">📋 Respuestas</button>
    <button class="nav-tab"        id="navPerfil"     onclick="openTab('perfil')">👤 Mi perfil</button>
</nav>

<!-- ── MAIN ── -->
<div class="main">

    <div id="loading"><div class="spinner"></div><p>Cargando tu espacio...</p></div>

    <!-- CONEXIONES -->
    <div class="tab-section" id="tab-feed">
        <h2 class="section-title">Mis Conexiones</h2>
        <p class="section-sub">Personas con las que hiciste match</p>
        <div id="feedList"></div>
    </div>

    <!-- MENSAJES -->
    <div class="tab-section" id="tab-mensajes">
        <!-- Lista de conversaciones -->
        <div id="msgList">
            <h2 class="section-title">Mensajes</h2>
            <p class="section-sub">Tus conversaciones activas</p>
            <div id="convoList"></div>
        </div>
        <!-- Vista de chat (se muestra al abrir una convo) -->
        <div id="chatView">
            <div class="chat-header">
                <button class="btn-back" onclick="closeChat()">← Volver</button>
                <div class="chat-header-av" id="chatAv"></div>
                <div class="chat-header-info">
                    <div class="chat-header-name" id="chatName"></div>
                    <div class="chat-header-seen" id="chatLastSeen"></div>
                </div>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input class="chat-input" id="chatInput" type="text"
                    placeholder="Escribe un mensaje..."
                    onkeydown="if(event.key==='Enter') sendMessage()" />
                <button class="btn-send" onclick="sendMessage()">Enviar</button>
            </div>
        </div>
    </div>

    <!-- EXPLORAR -->
    <div class="tab-section" id="tab-explorar">
        <h2 class="section-title">Explorar</h2>
        <p class="section-sub" id="explorarSub"></p>
        <div class="swipe-wrap">
            <div id="swipe-card" class="swipe-card"></div>
            <div class="action-btns" id="action-btns" style="display:none;">
                <button class="btn-pass" onclick="passProfile()">✕ Pasar</button>
                <button class="btn-like" onclick="likeProfile()">♥ Me interesa</button>
            </div>
            <p class="swipe-hint" id="swipe-hint"></p>
        </div>
    </div>

    <!-- RESPUESTAS -->
    <div class="tab-section" id="tab-respuestas">
        <h2 class="section-title">Mis Respuestas</h2>
        <p class="section-sub">Tu cuestionario de compatibilidad</p>
        <div id="respuestasList"></div>
    </div>

    <!-- PERFIL -->
    <div class="tab-section" id="tab-perfil">
        <h2 class="section-title">Mi Perfil</h2>
        <div id="perfilContent"></div>
    </div>
</div>

<!-- ── MATCH MODAL ── -->
<div class="modal-overlay" id="matchModal">
    <div class="modal-box">
        <div class="modal-emoji">🎉</div>
        <h2>¡Es un Match!</h2>
        <p id="matchModalText">Han mostrado interés mutuo.</p>

// ─── LAST SEEN FORMAT ────────────────────────────────────────────────────────
function formatLastSeen(ts) {
    if (!ts) return "Desconectado";
    const now  = Date.now();
    const diff = now - (ts.toMillis ? ts.toMillis() : ts);
    const mins = Math.floor(diff / 60000);
    if (mins < 2)  return "🟢 En línea";
    if (mins < 60) return `Última conexión hace ${mins} min`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24)  return `Última conexión hace ${hrs}h`;
    const days = Math.floor(hrs / 24);
    return `Última conexión hace ${days} día${days > 1 ? "s" : ""}`;
}

// ─── COMPATIBILITY ───────────────────────────────────────────────────────────
function ansIdx(ans, qi, isPsi) {
    if (!ans) return -1;
    const opts = isPsi ? qPsi[qi].opts : qPac[qi].opts;
    const i = opts.indexOf(ans);
    if (i !== -1) return i;
    if (ans.startsWith("Sí, integra") || ans.startsWith("Sí, práctica")) return 2;
    return -1;
}
function calcCompat(rPac, rPsi) {
    if (!rPac || !rPsi || !rPac.length || !rPsi.length) return 0;
    let score = 0;
    const n = Math.min(rPac.length, rPsi.length, 20);
    for (let i = 0; i < n; i++) {
        const p = ansIdx(rPac[i], i, false), t = ansIdx(rPsi[i], i, true);
        if (p === -1 || t === -1) { score += 1; continue; }
        if (p === t) score += 2;
        else if (Math.abs(p - t) === 1) score += 1;
    }
    return Math.round((score / (n * 2)) * 100);
}
function compatClass(pct) { return pct >= 70 ? "c-high" : pct >= 45 ? "c-mid" : "c-low"; }
function compatColor(pct) { return pct >= 70 ? "#2ecc71" : pct >= 45 ? "#f39c12" : "#e74c3c"; }
function getCorriente(resp, isPsi) {
    if (!resp || resp.length < 7) return "🔄 Integrativa";
    const r = resp[6] || "";
    if (isPsi) {
        if (r.includes("TCC"))          return "🧩 TCC / Sistémica";
        if (r.includes("Humanista"))    return "🌱 Humanista / Contextual";
        if (r.includes("Psicoanálisis")) return "🧠 Psicoanalítica";
    } else {
        if (r.includes("estrategias"))  return "🧩 TCC";
        if (r.includes("conciencia"))   return "🌱 Humanista";
        if (r.includes("historia"))     return "🧠 Psicoanalítica";
    }
    return "🔄 Integrativa";
}

async function likeProfile() {
    if (profileIndex >= profilesQueue.length) return;
    const { uid: targetUid, data: targetData, pct } = profilesQueue[profileIndex];
    document.getElementById("swipe-card").classList.add("fly-right");

    try {
        await db.collection("likes").doc(currentUser.uid+"_"+targetUid).set({
            from: currentUser.uid, to: targetUid, fromType: userType, fecha: new Date()
        });
        likedSet.add(targetUid);

        const rev = await db.collection("likes").doc(targetUid+"_"+currentUser.uid).get();
        if (rev.exists) {
            // ── MATCH ──
            const pacUid = userType==="paciente" ? currentUser.uid : targetUid;
            const psiUid = userType==="psicologo" ? currentUser.uid : targetUid;
            const matchId = [pacUid, psiUid].sort().join("_");

            await db.collection("matches").doc(matchId).set({
                paciente: pacUid, psicologo: psiUid, compatibility: pct, fecha: new Date()
            });

            // ── AUTO-GREETING ──
            let greetingText = "";
            if (userType === "psicologo") {
                greetingText = userData.saludoAutomatico || "";
            } else {
                const psiDoc = await db.collection("psicologos").doc(psiUid).get();
                if (psiDoc.exists) greetingText = psiDoc.data().saludoAutomatico || "";
            }

            // Init chat document
            await db.collection("chats").doc(matchId).set({
                participants: [pacUid, psiUid],
                lastMessage:  greetingText || "¡Es un match! Ya pueden hablar.",
                lastMessageTime: new Date(),
                unread: { [pacUid]: greetingText ? 1 : 0, [psiUid]: 0 }
            });

            if (greetingText) {
                await db.collection("chats").doc(matchId).collection("messages").add({
                    sender:    psiUid,
                    text:      greetingText,
                    timestamp: new Date(),
                    auto:      true
                });
            }

            const otherName = targetData.nombre || "tu nueva conexión";
            setTimeout(() => {
                document.getElementById("matchModalText").innerText =
                    `¡Tú y ${otherName} hicieron match! ${greetingText ? "El psicólogo ya te envió un saludo. 💬" : "Ya pueden escribirse."}`;
                document.getElementById("matchModal").classList.add("show");
            }, 340);
        }
    } catch(e) { console.error(e); }

    setTimeout(() => {
        document.getElementById("swipe-card").classList.remove("fly-right");
        profileIndex++; renderSwipeCard();
    }, 340);
}

async function passProfile() {
    if (profileIndex >= profilesQueue.length) return;
    const { uid: targetUid } = profilesQueue[profileIndex];
    document.getElementById("swipe-card").classList.add("fly-left");
    try {
        await db.collection("passes").doc(currentUser.uid+"_"+targetUid).set({ from: currentUser.uid, to: targetUid, fecha: new Date() });
        passedSet.add(targetUid);
    } catch(e) {}
    setTimeout(() => {
        document.getElementById("swipe-card").classList.remove("fly-left");
        profileIndex++; renderSwipeCard();
    }, 340);
}

    } catch(e) { container.innerHTML = ""; return; }

    if (!matchSnap || matchSnap.empty) {
        container.innerHTML = `<div class="empty-state"><div class="empty-icon">💬</div><h3>Sin conversaciones</h3><p>Haz match con alguien en <strong>Explorar</strong> para empezar a chatear.</p></div>`;
        return;
    }

    container.innerHTML = "";
    const rows = [];

    for (const doc of matchSnap.docs) {
        const md = doc.data(), matchId = doc.id;
        const otherUid = md[othF];
        const [od, chatDoc] = await Promise.all([
            db.collection(othC).doc(otherUid).get(),
            db.collection("chats").doc(matchId).get()
        ]);
        if (!od.exists) continue;

        const d = od.data();
        const chat = chatDoc.exists ? chatDoc.data() : {};
        const unread = (chat.unread || {})[currentUser.uid] || 0;
        const lastMsg = chat.lastMessage || "Inicia la conversación";
        const lastTime = chat.lastMessageTime ? formatMsgTime(chat.lastMessageTime) : "";
        const lastSeen = d.lastSeen ? formatLastSeen(d.lastSeen) : "Desconectado";
        const isOnline = d.lastSeen && (Date.now() - d.lastSeen.toMillis()) < 5 * 60 * 1000;
        const cardIsPsi = userType === "paciente";
        const emoji = cardIsPsi ? "🧠" : "👤";
        const safeName = (d.nombre||"Usuario").replace(/'/g,"\\'");

        rows.push({
            lastTime: chat.lastMessageTime ? chat.lastMessageTime.toMillis() : 0,
            html: `
                <div class="convo-item" onclick="openChat('${matchId}','${otherUid}','${safeName}','${emoji}')">
                    <div class="convo-av">
                        ${emoji}
                        ${isOnline ? '<div class="online-dot"></div>' : ''}
                    </div>
                    <div class="convo-body">
                        <div class="convo-name">${d.nombre||"Usuario"}</div>
                        <div class="convo-preview">${lastMsg}</div>
                        <div class="convo-lastseen">${lastSeen}</div>
                    </div>
                    <div class="convo-meta">
                        <div class="convo-time">${lastTime}</div>
                        ${unread > 0 ? `<div class="unread-badge">${unread}</div>` : ""}
                    </div>
                </div>`
        });
    }

    // Sort by most recent message
    rows.sort((a,b) => b.lastTime - a.lastTime);
    container.innerHTML = rows.map(r => r.html).join("");

    if (!rows.length) {
        container.innerHTML = `<div class="empty-state"><div class="empty-icon">💬</div><h3>Sin conversaciones aún</h3><p>Tus matches aparecerán aquí.</p></div>`;
    }
}

// ─── MENSAJES: CHAT ──────────────────────────────────────────────────────────
async function openChat(matchId, otherUid, otherName, emoji) {
    activeChatId = matchId;

    document.getElementById("msgList").style.display   = "none";
    document.getElementById("chatView").classList.add("open");

    document.getElementById("chatName").innerText = otherName;
    document.getElementById("chatAv").innerText   = emoji || "👤";
    document.getElementById("chatMessages").innerHTML = '<div style="text-align:center;padding:20px;color:var(--muted);">Cargando mensajes...</div>';
    document.getElementById("chatLastSeen").innerText = "";

    // Load last seen of other person
    const othC = userType === "paciente" ? "psicologos" : "usuarios";
    try {
        const od = await db.collection(othC).doc(otherUid).get();
        if (od.exists && od.data().lastSeen) {
            document.getElementById("chatLastSeen").innerText = formatLastSeen(od.data().lastSeen);
        }
    } catch(e) {}

    // Reset unread count for current user
    try {
        await db.collection("chats").doc(matchId).update({
            [`unread.${currentUser.uid}`]: 0
        });
    } catch(e) {}

    // Remove dot from nav
    const dot = document.querySelector("#navMensajes .unread-dot");
    if (dot) dot.remove();

    // Real-time messages
    if (chatUnsub) chatUnsub();
    chatUnsub = db.collection("chats").doc(matchId)
        .collection("messages")
        .orderBy("timestamp", "asc")
        .onSnapshot(snap => {
            const container = document.getElementById("chatMessages");
            container.innerHTML = "";
            snap.forEach(doc => {
                const m = doc.data();
                const isMine = m.sender === currentUser.uid;
                const time   = m.timestamp ? formatMsgTime(m.timestamp) : "";
                const autoTag = m.auto ? `<div class="msg-auto-tag">✉️ saludo automático</div>` : "";
                const div = document.createElement("div");
                div.className = "msg-row " + (isMine ? "mine" : "theirs");
                div.innerHTML = `
                    <div class="msg-bubble">
                        ${!isMine && m.auto ? autoTag : ""}
                        ${m.text}
                        <span class="msg-time">${time}</span>
                    </div>`;
                container.appendChild(div);
            });
            // Scroll to bottom
            container.scrollTop = container.scrollHeight;
        });

    document.getElementById("chatInput").focus();
}

function closeChat() {
    if (chatUnsub) { chatUnsub(); chatUnsub = null; }
    activeChatId = null;
    document.getElementById("chatView").classList.remove("open");
    document.getElementById("msgList").style.display = "block";
    loadConvoList();
}

async function sendMessage() {
    const input = document.getElementById("chatInput");
    const text  = input.value.trim();
    if (!text || !activeChatId) return;
    input.value = "";

    const msg = { sender: currentUser.uid, text, timestamp: new Date(), auto: false };

    try {
        await db.collection("chats").doc(activeChatId).collection("messages").add(msg);

        // Update chat metadata + increment unread for the OTHER person
        const chatDoc = await db.collection("chats").doc(activeChatId).get();
        const participants = chatDoc.exists ? (chatDoc.data().participants || []) : [];
        const otherUid = participants.find(uid => uid !== currentUser.uid);

        const update = {
            lastMessage: text,
            lastMessageTime: new Date()
        };
        if (otherUid) update[`unread.${otherUid}`] = firebase.firestore.FieldValue.increment(1);

        await db.collection("chats").doc(activeChatId).update(update);
    } catch(e) { console.error(e); input.value = text; }
}

// ─── UNREAD DOT (NAV) ────────────────────────────────────────────────────────
async function checkUnreadMessages() {
    const myF = userType === "paciente" ? "paciente" : "psicologo";
    try {
        const matches = await db.collection("matches").where(myF,"==",currentUser.uid).get();
        let totalUnread = 0;
        for (const doc of matches.docs) {
            const chatDoc = await db.collection("chats").doc(doc.id).get();
            if (chatDoc.exists) totalUnread += (chatDoc.data().unread || {})[currentUser.uid] || 0;
        }
        const btn = document.getElementById("navMensajes");
        if (totalUnread > 0 && !btn.querySelector(".unread-dot")) {
            const dot = document.createElement("span");
            dot.className = "unread-dot";
            btn.appendChild(dot);
        }
    } catch(e) {}
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function formatMsgTime(ts) {
    if (!ts) return "";
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    const now = new Date();
    if (d.toDateString() === now.toDateString()) {
        return d.toLocaleTimeString("es-MX", { hour: "2-digit", minute: "2-digit" });
    }
    return d.toLocaleDateString("es-MX", { day: "2-digit", month: "short" });
}

// ─── RESPUESTAS ──────────────────────────────────────────────────────────────
function renderRespuestas() {
    const list = document.getElementById("respuestasList");
    const resp = userData.respuestas || [];
    const labels = userType === "paciente" ? lblPac : lblPsi;
    if (!resp.length) {
        list.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><h3>Sin respuestas</h3><p>Completa el cuestionario para ver tus respuestas aquí.</p></div>`;
        return;
    }
    list.innerHTML = resp.map((r,i) => `
        <div class="resp-item">
            <div class="resp-lbl">${labels[i]||"Pregunta "+(i+1)}</div>
            <div class="resp-val">${r}</div>
        </div>`).join("");
}

async function saveAutoGreeting() {
    const text = document.getElementById("saludoInput").value.trim();
    try {
        await db.collection("psicologos").doc(currentUser.uid).update({ saludoAutomatico: text });
        userData.saludoAutomatico = text;
        const confirm = document.getElementById("saveConfirm");
        confirm.style.display = "block";
        setTimeout(() => { confirm.style.display = "none"; }, 3000);
    } catch(e) { alert("Error al guardar. Intenta de nuevo."); }
}
