<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
</head>
<body>

<h1>Bienvenido 🎉</h1>
<p id="user"></p>

<h3>Tus respuestas:</h3>
<ul id="respuestas"></ul>

<button onclick="logout()">Cerrar sesión</button>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCHyqyi3cBQRm_Z9xeYDxQQa0BGTB8n1HQ",
  authDomain: "psicoconecta-a507d.firebaseapp.com",
  projectId: "psicoconecta-a507d",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// USUARIO + RESPUESTAS
auth.onAuthStateChanged(async user => {
    if (user) {
        document.getElementById("user").innerText = user.email;

try {
    const lista = document.getElementById("respuestas");
    lista.innerHTML = "";

    const query = await db.collection("usuarios")
        .where("email", "==", user.email)
        .get();

  if (!query.empty) {

    let data = null;

    query.forEach(doc => {
        data = doc.data();
    });

    if (data.respuestas && data.respuestas.length > 0) {
        data.respuestas.forEach((r, i) => {
            const li = document.createElement("li");
            li.innerText = "Pregunta " + (i + 1) + ": " + r;
            lista.appendChild(li);
        });
    } else {
        lista.innerHTML = "<li>No hay respuestas guardadas</li>";
    }

} else {
    lista.innerHTML = "<li>No hay respuestas guardadas</li>";
}

} catch (error) {
    console.log(error);
}
}

    } else {
        window.location.href = "index.html";
    }
});

// LOGOUT
function logout() {
    auth.signOut().then(() => {
        window.location.href = "index.html";
    });
}
</script>

</body>
</html>
