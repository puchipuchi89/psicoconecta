<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body { font-family: Arial; }

        .tabs {
            margin-top: 20px;
        }

        .tab-buttons button {
            padding: 10px;
            margin-right: 5px;
            cursor: pointer;
        }

        .tab {
            display: none;
            margin-top: 15px;
            padding: 10px;
            border: 1px solid #ccc;
        }

        .active {
            display: block;
        }
    </style>
</head>

<body>

<h1>Bienvenido 🎉</h1>

<p id="status">Cargando sesión...</p>
<p id="user"></p>

<div class="tabs">

    <!-- BOTONES -->
    <div class="tab-buttons">
        <button onclick="openTab('resultadoTab')">🧠 Resultado</button>
        <button onclick="openTab('respuestasTab')">📋 Mis respuestas</button>
    </div>

    <!-- RESULTADO -->
    <div id="resultadoTab" class="tab active">
        <h3>Resultado psicológico</h3>
        <p id="resultado">Analizando...</p>
    </div>

    <!-- RESPUESTAS -->
    <div id="respuestasTab" class="tab">
        <h3>Tus respuestas</h3>
        <ul id="respuestas"></ul>
    </div>

</div>

<br>
<button onclick="logout()">Cerrar sesión</button>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCHyqyi3cBQRm_Z9xeYDxQQa0BGTB8n1HQ",
  authDomain: "psicoconecta-a507d.firebaseapp.com",
  projectId: "psicoconecta-a507d",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let unsubscribe = null;

// ---------------- TABS ----------------
function openTab(tabId) {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.getElementById(tabId).classList.add("active");
}

// ---------------- ANALISIS ----------------
function analizarCorriente(respuestas) {

    let score = {
        psicoanalitica: 0,
        tcc: 0,
        humanista: 0,
        sistemica: 0,
        gestalt: 0,
        conductual: 0,
        familiar: 0,
        integrativa: 0
    };

    const text = respuestas.join(" ").toLowerCase();

    if (text.includes("historia") || text.includes("pasado") || text.includes("análisis") || text.includes("duelo")) {
        score.psicoanalitica += 2;
    }

    if (text.includes("soluciones") || text.includes("herramientas") || text.includes("ejercicios prácticos") || text.includes("ansiedad")) {
        score.tcc += 2;
    }

    if (text.includes("crecimiento personal") || text.includes("autoestima") || text.includes("escucha") || text.includes("emocional")) {
        score.humanista += 2;
    }

    if (text.includes("pareja") || text.includes("familia") || text.includes("grupo") || text.includes("relación")) {
        score.sistemica += 2;
    }

    if (text.includes("presente") || text.includes("aquí") || text.includes("ahora") || text.includes("experiencia")) {
        score.gestalt += 2;
    }

    if (text.includes("hábitos") || text.includes("conducta") || text.includes("refuerzo")) {
        score.conductual += 2;
    }

    if (text.includes("familia") || text.includes("crianza") || text.includes("padres") || text.includes("hogar")) {
        score.familiar += 2;
    }

    let max = Math.max(...Object.values(score));
    let top = Object.keys(score).filter(k => score[k] === max);

    if (top.length > 1 || max === 0) {
        return "🔄 Integrativa: combinación de varios enfoques terapéuticos";
    }

    const resultados = {
        psicoanalitica: "🧠 Psicoanalítica: análisis profundo de tu historia y emociones",
        tcc: "🧩 Cognitivo-Conductual: enfoque en soluciones y cambio de hábitos",
        humanista: "🌱 Humanista: crecimiento personal y desarrollo emocional",
        sistemica: "👥 Sistémica: enfoque en relaciones y entorno",
        gestalt: "🎯 Gestalt: enfoque en el presente y experiencia",
        conductual: "⚙️ Conductual: cambio de conducta y hábitos",
        familiar: "🏠 Familiar: dinámica familiar y crianza",
        integrativa: "🔄 Integrativa"
    };

    return resultados[top[0]];
}

// ---------------- AUTH ----------------
auth.onAuthStateChanged(user => {

    const status = document.getElementById("status");
    const lista = document.getElementById("respuestas");
    const resultado = document.getElementById("resultado");

    if (user) {

        status.innerText = "Cargando datos...";
        document.getElementById("user").innerText = user.email;

        if (unsubscribe) unsubscribe();

        unsubscribe = db.collection("usuarios").doc(user.uid)
            .onSnapshot(doc => {

                lista.innerHTML = "";

                if (doc.exists) {
                    const data = doc.data();
                    const respuestas = data.respuestas || [];

                    if (respuestas.length > 0) {

                        respuestas.forEach((r, i) => {
                            const li = document.createElement("li");
                            li.innerText = "Pregunta " + (i + 1) + ": " + r;
                            lista.appendChild(li);
                        });

                        resultado.innerText = analizarCorriente(respuestas);

                    } else {
                        lista.innerHTML = "<li>No hay respuestas</li>";
                        resultado.innerText = "Sin datos suficientes";
                    }

                } else {
                    lista.innerHTML = "<li>No hay datos</li>";
                }

                status.innerText = "";
            });

    } else {
        window.location.href = "index.html";
    }
});

// ---------------- LOGOUT ----------------
function logout() {
    auth.signOut().then(() => {
        window.location.href = "index.html";
    });
}
</script>

</body>
</html>
