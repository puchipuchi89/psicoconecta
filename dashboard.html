<script>
const firebaseConfig = {
  apiKey: "AIzaSyCHyqyi3cBQRm_Z9xeYDxQQa0BGTB8n1HQ",
  authDomain: "psicoconecta-a507d.firebaseapp.com",
  projectId: "psicoconecta-a507d",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// USUARIO + RESPUESTAS
auth.onAuthStateChanged(async user => {
    if (user) {
        document.getElementById("user").innerText = user.email;

        try {
            const doc = await db.collection("usuarios").doc(user.uid).get();

            const lista = document.getElementById("respuestas");
            lista.innerHTML = "";

            if (doc.exists) {
                const data = doc.data();

                if (data.respuestas && data.respuestas.length > 0) {
                    data.respuestas.forEach((r, i) => {
                        const li = document.createElement("li");
                        li.innerText = "Pregunta " + (i + 1) + ": " + r;
                        lista.appendChild(li);
                    });
                } else {
                    lista.innerHTML = "<li>No hay respuestas guardadas</li>";
                }

            } else {
                lista.innerHTML = "<li>No hay datos del usuario</li>";
            }

        } catch (error) {
            console.log(error);
        }

    } else {
        window.location.href = "index.html";
    }
});

// LOGOUT
function logout() {
    auth.signOut().then(() => {
        window.location.href = "index.html";
    });
}
</script>
