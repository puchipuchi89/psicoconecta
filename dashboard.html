<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
</head>
<body>

<h1>Bienvenido 🎉</h1>

<p id="status">Cargando sesión...</p>
<p id="user"></p>

<h3>Tus respuestas:</h3>
<ul id="respuestas"></ul>

<button onclick="logout()">Cerrar sesión</button>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
console.log("SCRIPT CARGADO");

const firebaseConfig = {
  apiKey: "AIzaSyCHyqyi3cBQRm_Z9xeYDxQQa0BGTB8n1HQ",
  authDomain: "psicoconecta-a507d.firebaseapp.com",
  projectId: "psicoconecta-a507d",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let unsubscribe = null; // para limpiar listener si cambia usuario

auth.onAuthStateChanged(user => {
    console.log("USER:", user);

    const status = document.getElementById("status");
    const lista = document.getElementById("respuestas");

    if (user) {
        status.innerText = "Cargando datos...";
        document.getElementById("user").innerText = user.email;

        // 🔥 IMPORTANTE: listener en tiempo real
        if (unsubscribe) unsubscribe();

        unsubscribe = db.collection("usuarios").doc(user.uid)
            .onSnapshot(doc => {

                lista.innerHTML = "";

                if (doc.exists) {
                    const data = doc.data();

                    if (data.respuestas && data.respuestas.length > 0) {
                        data.respuestas.forEach((r, i) => {
                            const li = document.createElement("li");
                            li.innerText = "Pregunta " + (i + 1) + ": " + r;
                            lista.appendChild(li);
                        });
                    } else {
                        lista.innerHTML = "<li>No hay respuestas guardadas</li>";
                    }

                } else {
                    lista.innerHTML = "<li>No hay datos del usuario</li>";
                }

                status.innerText = "";
            });

    } else {
        status.innerText = "No hay sesión";
        window.location.href = "index.html";
    }
});

function logout() {
    auth.signOut().then(() => {
        window.location.href = "index.html";
    });
}
</script>

</body>
</html>
