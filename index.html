<!DOCTYPE HTML>
<html>
<head>
    <title>Enfoques - Plataforma</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="assets/css/main.css" />
</head>

<body class="is-preload">

<div id="header">
    <h1>Bienvenido a PsicoConecta</h1>
    <p>Crea tu perfil y encuentra tu mejor opción de terapia!!!</p>
</div>

<div id="main">
<div class="box container">

<!-- ================= STEP 1 ================= -->
<div id="step1">
    <h2>Crear perfil</h2>

    <input type="text" id="nombre" placeholder="Primer nombre" />
    <input type="text" id="apellido" placeholder="Apellido" />

    <input type="email" id="correo" placeholder="Correo electrónico" />
    <input type="password" id="password" placeholder="Contraseña" />

    <select id="ubicacion">
        <option value="">Elige tu estado</option>

        <option>Aguascalientes</option>
        <option>Baja California</option>
        <option>Baja California Sur</option>
        <option>Campeche</option>
        <option>Chiapas</option>
        <option>Chihuahua</option>
        <option>Ciudad de México</option>
        <option>Coahuila</option>
        <option>Colima</option>
        <option>Durango</option>
        <option>Estado de México</option>
        <option>Guanajuato</option>
        <option>Guerrero</option>
        <option>Hidalgo</option>
        <option>Jalisco</option>
        <option>Michoacán</option>
        <option>Morelos</option>
        <option>Nayarit</option>
        <option>Nuevo León</option>
        <option>Oaxaca</option>
        <option>Puebla</option>
        <option>Querétaro</option>
        <option>Quintana Roo</option>
        <option>San Luis Potosí</option>
        <option>Sinaloa</option>
        <option>Sonora</option>
        <option>Tabasco</option>
        <option>Tamaulipas</option>
        <option>Tlaxcala</option>
        <option>Veracruz</option>
        <option>Yucatán</option>
        <option>Zacatecas</option>
    </select>

    <textarea id="motivo" placeholder="Motivo de consulta"></textarea>

    <button onclick="startQuiz()">Continuar</button>
    <button onclick="login()" style="margin-top:10px;">Ya tengo cuenta</button>
</div>

<!-- ================= STEP 2 ================= -->
<div id="step2" style="display:none;">
    <h2 id="question"></h2>
    <p id="progress"></p>
    <div id="options"></div>
    <button onclick="prevQuestion()">Atrás</button>
</div>

<!-- ================= FINAL ================= -->
<div id="final" style="display:none;">
    <h2>✅ Todo listo</h2>
    <p>Tu perfil ha sido creado correctamente.</p>
    <button onclick="goHome()">Ir al dashboard</button>
</div>

</div>
</div>

<!-- ================= FIREBASE ================= -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCHyqyi3cBQRm_Z9xeYDxQQa0BGTB8n1HQ",
  authDomain: "psicoconecta-a507d.firebaseapp.com",
  projectId: "psicoconecta-a507d",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
</script>

<script>

// ================= PREGUNTAS (INTACTAS) =================
const preguntas = [
   { q: "¿Cómo prefieres tomar terapia?", opts: ["Presencial", "En línea", "Me da igual"] },
   { q: "¿Qué tan lejos estarías dispuesto a atenderte?", opts: ["Solo en mi ciudad", "En cualquier lugar del país", "En cualquier parte del mundo"] },
   { q: "¿Para quién es la terapia?", opts: ["Niño o adolescente", "Adulto o adulto mayor", "Grupo de distintas edades"] },
   { q: "Tipo de terapia que buscas", opts: ["Individual", "Pareja o familiar", "Grupal"] },
   { q: "Motivo principal de consulta", opts: ["Ansiedad, depresión, regulación emocional, duelo", "Evaluación neuropsicológica", "Trastornos conductuales"] },
   { q: "¿Cómo te gustaría que fuera la terapia?", opts: ["Ejercicios prácticos", "Mixto", "Reflexión profunda"] },
   { q: "¿Qué tipo de enfoque te gustaría más?", opts: ["Soluciones", "Crecimiento personal", "Historia personal"] },
   { q: "¿Qué estilo prefieres en tu terapeuta?", opts: ["Directo", "Colaborativo", "Reflexivo"] },
   { q: "¿Qué esperas principalmente del terapeuta?", opts: ["Herramientas", "Escucha", "Análisis"] },
   { q: "¿Te gustaría que incluya espiritualidad?", opts: ["No", "Tal vez", "Sí"] },
   { q: "¿Cuánto tiempo crees que necesitarás terapia?", opts: ["Pocas sesiones", "Meses", "Proceso largo"] },
   { q: "¿Con qué frecuencia te gustaría tener sesiones?", opts: ["Semanal", "Quincenal", "Flexible"] },
   { q: "Preferencia de género del terapeuta", opts: ["Mujer", "Hombre", "Indistinto"] },
   { q: "¿Qué aspectos son importantes?", opts: ["Clínico", "Cultural", "Espiritual"] },
   { q: "¿En qué horario puedes tomar terapia?", opts: ["Mañana", "Tarde", "Noche"] },
   { q: "¿Cuál es tu presupuesto?", opts: ["< $500", "$500–$1000", "> $700"] },
   { q: "¿Te importa la experiencia?", opts: ["No", "Algo", "Mucho"] },
   { q: "¿Nivel de formación?", opts: ["Licenciatura", "Maestría", "Doctorado"] },
   { q: "¿Te interesan otras actividades?", opts: ["No", "Tal vez", "Sí"] },
   { q: "¿Qué tan pronto necesitas empezar?", opts: ["Puedo esperar", "Pronto", "Urgente"] }
];

let current = 0;
let respuestas = [];

// ================= REGISTRO =================
async function startQuiz() {

    const nombre = document.getElementById("nombre").value;
    const apellido = document.getElementById("apellido").value;
    const correo = document.getElementById("correo").value;
    const password = document.getElementById("password").value;

    if (!nombre || !apellido || !correo || !password) {
        alert("Completa todos los campos");
        return;
    }

    respuestas = [];

    try {
        await auth.createUserWithEmailAndPassword(correo, password);

        document.getElementById("step1").style.display = "none";
        document.getElementById("step2").style.display = "block";

        showQuestion();

    } catch (error) {
        alert(error.message);
    }
}

// ================= LOGIN =================
async function login() {
    const correo = document.getElementById("correo").value;
    const password = document.getElementById("password").value;

    if (!correo || !password) {
        alert("Ingresa correo y contraseña");
        return;
    }

    try {
        await auth.signInWithEmailAndPassword(correo, password);
        window.location.href = "dashboard.html";
    } catch (error) {
        alert("Error: " + error.message);
    }
}

// ================= QUIZ =================
function showQuestion() {
    const q = preguntas[current];

    document.getElementById("question").innerText =
        (current + 1) + "/20 - " + q.q;

    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";

    q.opts.forEach(opt => {
        const btn = document.createElement("button");
        btn.innerText = opt;
        btn.onclick = () => nextQuestion(opt);
        optionsDiv.appendChild(btn);
    });
}

function nextQuestion(answer) {
    respuestas.push(answer);

    if (current < preguntas.length - 1) {
        current++;
        showQuestion();
    } else {
        finish();
    }
}

function prevQuestion() {
    if (current > 0) {
        current--;
        respuestas.pop();
        showQuestion();
    }
}

// ================= FINAL (FIRESTORE INTACTO) =================
async function finish() {

    const user = auth.currentUser;
    if (!user) return alert("Error: usuario no autenticado");

    const nombreCompleto =
        document.getElementById("nombre").value + " " +
        document.getElementById("apellido").value;

    try {
        await db.collection("usuarios").doc(user.uid).set({
            email: user.email,
            nombre: nombreCompleto,
            ubicacion: document.getElementById("ubicacion").value,
            motivo: document.getElementById("motivo").value,
            respuestas: respuestas,
            fecha: new Date()
        });

        document.getElementById("step2").style.display = "none";
        document.getElementById("final").style.display = "block";

    } catch (error) {
        console.log(error);
        alert("Error guardando datos");
    }
}

// ================= DASHBOARD =================
function goHome() {
    window.location.href = "dashboard.html";
}

</script>

</body>
</html>
