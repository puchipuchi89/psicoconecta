<!DOCTYPE HTML>
<html>
<head>
    <title>PsicoConecta</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #e0f7ff, #f7f0ff);
        }

        /* HEADER */
        #header {
            text-align: center;
            padding: 40px 20px;
        }

        #header h1 {
            font-size: 40px;
            margin: 0;
            color: #333;
        }

        #header p {
            color: #666;
            margin-top: 10px;
        }

        /* CONTENEDOR */
        .box {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid #ddd;
            outline: none;
        }

        textarea {
            resize: none;
            height: 80px;
        }

        /* BOTONES */
        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
        }

        .primary {
            background: #6c63ff;
            color: white;
        }

        .secondary {
            background: transparent;
            border: 2px solid #6c63ff;
            color: #6c63ff;
        }

        button:hover {
            opacity: 0.9;
        }

        /* QUIZ */
        #step2 {
            text-align: center;
        }

        #question {
            font-size: 20px;
            margin-bottom: 20px;
        }

        #options button {
            margin: 5px 0;
            background: white;
            border: 2px solid #6c63ff;
            color: #6c63ff;
        }

        #options button:hover {
            background: #6c63ff;
            color: white;
        }

        /* FINAL */
        #final {
            text-align: center;
        }

    </style>
</head>

<body class="is-preload">

<!-- HEADER -->
<div id="header">
    <h1>PsicoConecta 🧠</h1>
    <p>Encuentra tu mejor enfoque terapéutico</p>
</div>

<div class="box">

<!-- ================= LOGIN / REGISTRO ================= -->
<div id="step1">

    <h2 style="text-align:center;">Crear perfil</h2>

    <input type="text" id="nombre" placeholder="Primer nombre" />
    <input type="text" id="apellido" placeholder="Apellido" />

    <input type="email" id="correo" placeholder="Correo electrónico" />
    <input type="password" id="password" placeholder="Contraseña" />

    <select id="ubicacion">
        <option value="">Elige tu estado</option>
        <option>Puebla</option>
        <option>Ciudad de México</option>
        <option>Jalisco</option>
        <option>Nuevo León</option>
        <option>Veracruz</option>
    </select>

    <textarea id="motivo" placeholder="Motivo de consulta"></textarea>

    <button class="primary" onclick="startQuiz()">Continuar</button>
    <button class="secondary" onclick="showLogin()">Ya tengo cuenta</button>

</div>

<!-- LOGIN -->
<div id="loginBox" style="display:none;">

    <h2 style="text-align:center;">Iniciar sesión</h2>

    <input type="email" id="loginCorreo" placeholder="Correo electrónico" />
    <input type="password" id="loginPassword" placeholder="Contraseña" />

    <button class="primary" onclick="loginUser()">Entrar</button>
    <button class="secondary" onclick="showRegister()">Crear cuenta</button>

</div>

<!-- QUIZ -->
<div id="step2" style="display:none;">
    <h2 id="question"></h2>
    <div id="options"></div>
    <button class="secondary" onclick="prevQuestion()">Atrás</button>
</div>

<!-- FINAL -->
<div id="final" style="display:none;">
    <h2>✅ Todo listo</h2>
    <p>Tu perfil fue creado correctamente</p>
    <button class="primary" onclick="goHome()">Ir al dashboard</button>
</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCHyqyi3cBQRm_Z9xeYDxQQa0BGTB8n1HQ",
  authDomain: "psicoconecta-a507d.firebaseapp.com",
  projectId: "psicoconecta-a507d",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
</script>

<script>

// ================= UI NAV =================
function showLogin() {
    document.getElementById("step1").style.display = "none";
    document.getElementById("loginBox").style.display = "block";
}

function showRegister() {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("step1").style.display = "block";
}

// ================= LOGIN =================
async function loginUser() {
    const email = document.getElementById("loginCorreo").value;
    const pass = document.getElementById("loginPassword").value;

    try {
        await auth.signInWithEmailAndPassword(email, pass);
        window.location.href = "dashboard.html";
    } catch (e) {
        alert(e.message);
    }
}

// ================= REGISTRO =================
async function startQuiz() {
    const nombre = document.getElementById("nombre").value;
    const apellido = document.getElementById("apellido").value;
    const correo = document.getElementById("correo").value;
    const password = document.getElementById("password").value;

    if (!nombre || !apellido || !correo || !password) {
        alert("Completa todos los campos");
        return;
    }

    try {
        await auth.createUserWithEmailAndPassword(correo, password);

        document.getElementById("step1").style.display = "none";
        document.getElementById("step2").style.display = "block";

        showQuestion();

    } catch (error) {
        alert(error.message);
    }
}

// ================= QUIZ (placeholder) =================
let current = 0;
let respuestas = [];

function showQuestion() {
    document.getElementById("question").innerText = "Pregunta " + (current + 1);
}

function prevQuestion() {
    if (current > 0) current--;
}

// ================= FINAL =================
function goHome() {
    window.location.href = "dashboard.html";
}

</script>

</body>
</html>
