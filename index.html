<body class="is-preload">

<div id="header">
    <h1>Bienvenido a PsicoConecta</h1>
    <p>Crea tu perfil o inicia sesión</p>
</div>

<div id="main">
<div class="box container">

<!-- ===================== -->
<!-- 🟢 REGISTRO + QUIZ -->
<!-- ===================== -->
<div id="step1">

    <h2>Crear perfil</h2>

    <input type="text" id="nombre" placeholder="Primer nombre" />
    <input type="text" id="apellido" placeholder="Apellido" />
    <input type="email" id="correo" placeholder="Correo electrónico" />
    <input type="password" id="password" placeholder="Contraseña" />

    <select id="ubicacion">
        <option value="">Elige tu estado</option>
        <option>Puebla</option>
        <option>Ciudad de México</option>
        <option>Jalisco</option>
        <option>Nuevo León</option>
        <option>Veracruz</option>
    </select>

    <textarea id="motivo" placeholder="Motivo de consulta"></textarea>

    <button onclick="startQuiz()">Continuar</button>

    <!-- 🔁 CAMBIO DE PANTALLA -->
    <button onclick="showLogin()" style="margin-top:10px;">
        Ya tengo cuenta
    </button>
</div>

<!-- ===================== -->
<!-- 🔵 LOGIN -->
<!-- ===================== -->
<div id="loginBox" style="display:none;">

    <h2>Iniciar sesión</h2>

    <input type="email" id="loginCorreo" placeholder="Correo electrónico" />
    <input type="password" id="loginPassword" placeholder="Contraseña" />

    <button onclick="loginUser()">Entrar</button>

    <button onclick="showRegister()" style="margin-top:10px;">
        Crear cuenta
    </button>
</div>

<!-- ===================== -->
<!-- 🟡 QUIZ -->
<!-- ===================== -->
<div id="step2" style="display:none;">
    <h2 id="question"></h2>
    <div id="options"></div>
    <button onclick="prevQuestion()">Atrás</button>
</div>

<!-- ===================== -->
<!-- ✅ FINAL -->
<!-- ===================== -->
<div id="final" style="display:none;">
    <h2>✅ Todo listo</h2>
    <button onclick="goHome()">Ir al dashboard</button>
</div>

</div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCHyqyi3cBQRm_Z9xeYDxQQa0BGTB8n1HQ",
  authDomain: "psicoconecta-a507d.firebaseapp.com",
  projectId: "psicoconecta-a507d",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
</script>

<script>

// =====================
// 🔁 CAMBIO DE PANTALLAS
// =====================
function showLogin() {
    document.getElementById("step1").style.display = "none";
    document.getElementById("loginBox").style.display = "block";
}

function showRegister() {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("step1").style.display = "block";
}

// =====================
// 🔐 LOGIN REAL
// =====================
async function loginUser() {
    const email = document.getElementById("loginCorreo").value;
    const pass = document.getElementById("loginPassword").value;

    try {
        await auth.signInWithEmailAndPassword(email, pass);
        window.location.href = "dashboard.html";
    } catch (e) {
        alert("Error: " + e.message);
    }
}

// =====================
// 🟢 REGISTRO
// =====================
async function startQuiz() {
    const nombre = document.getElementById("nombre").value;
    const apellido = document.getElementById("apellido").value;
    const correo = document.getElementById("correo").value;
    const password = document.getElementById("password").value;

    if (!nombre || !apellido || !correo || !password) {
        alert("Completa todos los campos");
        return;
    }

    try {
        await auth.createUserWithEmailAndPassword(correo, password);

        document.getElementById("step1").style.display = "none";
        document.getElementById("step2").style.display = "block";

        showQuestion();

    } catch (error) {
        alert(error.message);
    }
}

// =====================
// 🔚 FINAL
// =====================
function goHome() {
    window.location.href = "dashboard.html";
}

// (tu quiz sigue igual abajo)
</script>

</body>
