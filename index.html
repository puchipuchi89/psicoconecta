<!DOCTYPE HTML>
<html>
<head>
    <title>Enfoques - Plataforma</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="assets/css/main.css" />
</head>

<body class="is-preload">

<!-- HEADER -->
<div id="header">
    <h1>Bienvenido a Enfoques</h1>
    <p>Crea tu perfil y encuentra tu mejor opción de terapia</p>
</div>

<!-- MAIN -->
<div id="main">

<div class="box container">

    <!-- PASO 1 -->
    <div id="step1">
        <h2>Crear perfil</h2>

        <input type="text" id="nombre" placeholder="Nombre completo" />
        <input type="email" id="correo" placeholder="Correo electrónico" />
        <input type="password" id="password" placeholder="Contraseña" />
        <input type="text" id="ubicacion" placeholder="Ciudad" />
        <textarea id="motivo" placeholder="Motivo de consulta"></textarea>

        <button onclick="startQuiz()">Continuar</button>
    </div>

    <!-- PASO 2 -->
    <div id="step2" style="display:none;">
        <h2 id="question"></h2>
        <p id="progress"></p>
        <div id="options"></div>

        <button onclick="prevQuestion()">Atrás</button>
    </div>

    <!-- FINAL -->
    <div id="final" style="display:none;">
        <h2>✅ Todo listo</h2>
        <p>Tu perfil ha sido creado correctamente.</p>
        <button onclick="goHome()">Ir al dashboard</button>
    </div>

</div>

</div>

<!-- SCRIPTS -->
<script src="assets/js/jquery.min.js"></script>
<script src="assets/js/main.js"></script>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCHyqyi3cBQRm_Z9xeYDxQQa0BGTB8n1HQ",
  authDomain: "psicoconecta-a507d.firebaseapp.com",
  projectId: "psicoconecta-a507d",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
</script>

<script>
// PREGUNTAS
const preguntas = [
    { q: "¿Cómo prefieres tomar terapia?", opts: ["Presencial", "En línea", "Me da igual"] },
    { q: "¿Qué tan lejos estarías dispuesto a atenderte?", opts: ["Solo en mi ciudad", "En cualquier lugar del país", "En cualquier parte del mundo"] },
    { q: "¿Para quién es la terapia?", opts: ["Niño o adolescente", "Adulto", "Grupo"] },
    { q: "Tipo de terapia", opts: ["Individual", "Pareja", "Grupal"] },
    { q: "Motivo", opts: ["Ansiedad", "Evaluación", "Conducta"] }
];

let current = 0;
let respuestas = [];

// REGISTRO
async function startQuiz() {
    const nombre = document.getElementById("nombre").value;
    const correo = document.getElementById("correo").value;
    const password = document.getElementById("password").value;

    if (!nombre || !correo || !password) {
        alert("Completa todos los campos");
        return;
    }

    try {
        await auth.createUserWithEmailAndPassword(correo, password);

        document.getElementById("step1").style.display = "none";
        document.getElementById("step2").style.display = "block";

        showQuestion();

    } catch (error) {
        alert(error.message);
    }
}

// MOSTRAR PREGUNTA
function showQuestion() {
    const q = preguntas[current];
    document.getElementById("question").innerText = q.q;
    document.getElementById("progress").innerText = (current + 1) + "/" + preguntas.length;

    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";

    q.opts.forEach(opt => {
        const btn = document.createElement("button");
        btn.innerText = opt;
        btn.onclick = () => nextQuestion(opt);
        optionsDiv.appendChild(btn);
    });
}

// SIGUIENTE
function nextQuestion(answer) {
    respuestas[current] = answer;

    if (current < preguntas.length - 1) {
        current++;
        showQuestion();
    } else {
        finish();
    }
}

// ATRÁS
function prevQuestion() {
    if (current > 0) {
        current--;
        showQuestion();
    }
}

// FINAL
function finish() {
    document.getElementById("step2").style.display = "none";
    document.getElementById("final").style.display = "block";
}

// REDIRECCIÓN
function goHome() {
    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
