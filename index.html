<!DOCTYPE HTML>
<html>
<head>
    <title>Enfoques - Plataforma</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="assets/css/main.css" />
</head>

<body class="is-preload">

<div id="header">
    <h1>Bienvenido a PsicoConecta</h1>
    <p>Crea tu perfil y encuentra tu mejor opción de terapia!!!</p>
</div>

<div id="main">
<div class="box container">

<!-- ================= STEP 1 - PACIENTE ================= -->
<div id="step1">
    <h2>Crear perfil</h2>

    <input type="text" id="nombre" placeholder="Primer nombre" />
    <input type="text" id="apellido" placeholder="Apellido" />
    <input type="email" id="correo" placeholder="Correo electrónico" />
    <input type="password" id="password" placeholder="Contraseña" />

    <select id="ubicacion">
        <option value="">Elige tu estado</option>
        <option>Aguascalientes</option>
        <option>Baja California</option>
        <option>Baja California Sur</option>
        <option>Campeche</option>
        <option>Chiapas</option>
        <option>Chihuahua</option>
        <option>Ciudad de México</option>
        <option>Coahuila</option>
        <option>Colima</option>
        <option>Durango</option>
        <option>Estado de México</option>
        <option>Guanajuato</option>
        <option>Guerrero</option>
        <option>Hidalgo</option>
        <option>Jalisco</option>
        <option>Michoacán</option>
        <option>Morelos</option>
        <option>Nayarit</option>
        <option>Nuevo León</option>
        <option>Oaxaca</option>
        <option>Puebla</option>
        <option>Querétaro</option>
        <option>Quintana Roo</option>
        <option>San Luis Potosí</option>
        <option>Sinaloa</option>
        <option>Sonora</option>
        <option>Tabasco</option>
        <option>Tamaulipas</option>
        <option>Tlaxcala</option>
        <option>Veracruz</option>
        <option>Yucatán</option>
        <option>Zacatecas</option>
    </select>

    <textarea id="motivo" placeholder="Motivo de consulta"></textarea>

    <button onclick="startQuiz()">Continuar</button>
    <button onclick="showPsiRegistro()" style="margin-top:10px;">Soy psicólogo</button>
    <button onclick="login()" style="margin-top:10px;">Ya tengo cuenta</button>
</div>

<!-- ================= STEP 1 - PSICÓLOGO ================= -->
<div id="step1_psi" style="display:none;">
    <h2>Registro de psicólogo</h2>

    <input type="text" id="psi_nombre" placeholder="Primer nombre" />
    <input type="text" id="psi_apellido" placeholder="Apellido" />
    <input type="email" id="psi_correo" placeholder="Correo electrónico" />
    <input type="password" id="psi_password" placeholder="Contraseña" />
    <input type="text" id="psi_cedula" placeholder="Cédula profesional" />
    <input type="text" id="psi_enfoque" placeholder="Enfoque a trabajar" />
    <input type="text" id="psi_consultorio" placeholder="Dirección del consultorio" />

    <button onclick="startQuizPsi()">Continuar</button>
    <button onclick="showStep1()" style="margin-top:10px;">← Regresar</button>
    <button onclick="loginPsi()" style="margin-top:10px;">Ya tengo cuenta</button>
</div>

<!-- ================= STEP 2 - PACIENTE ================= -->
<div id="step2" style="display:none;">
    <h2 id="question"></h2>
    <div id="options"></div>
    <div id="religion_sub" style="display:none; margin-top:15px;">
        <p><strong>¿Cuál tradición o creencia?</strong></p>
        <select id="religion_select">
            <option value="Cristianismo">Cristianismo</option>
            <option value="Judaísmo">Judaísmo</option>
            <option value="Islam">Islam</option>
            <option value="Budismo">Budismo</option>
            <option value="Espiritualidad no religiosa">Espiritualidad no religiosa</option>
            <option value="Otra">Otra</option>
        </select>
        <button onclick="confirmarReligionPaciente()" style="margin-top:10px;">Confirmar</button>
    </div>
    <button onclick="prevQuestion()" style="margin-top:15px;">Atrás</button>
</div>

<!-- ================= STEP 2 - PSICÓLOGO ================= -->
<div id="step2_psi" style="display:none;">
    <h2 id="psi_question"></h2>
    <div id="psi_options"></div>
    <div id="psi_religion_sub" style="display:none; margin-top:15px;">
        <p><strong>¿Cuál tradición o creencia?</strong></p>
        <select id="psi_religion_select">
            <option value="Cristianismo">Cristianismo</option>
            <option value="Judaísmo">Judaísmo</option>
            <option value="Islam">Islam</option>
            <option value="Budismo">Budismo</option>
            <option value="Espiritualidad no religiosa">Espiritualidad no religiosa</option>
            <option value="Otra">Otra</option>
        </select>
        <button onclick="confirmarReligionPsi()" style="margin-top:10px;">Confirmar</button>
    </div>
    <button onclick="prevPsiQuestion()" style="margin-top:15px;">Atrás</button>
</div>

<!-- ================= FINAL ================= -->
<div id="final" style="display:none;">
    <h2>✅ Todo listo</h2>
    <p>Tu perfil ha sido creado correctamente.</p>
    <button onclick="goHome()">Ir al dashboard</button>
</div>

</div>
</div>

<!-- ================= FIREBASE ================= -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCHyqyi3cBQRm_Z9xeYDxQQa0BGTB8n1HQ",
  authDomain: "psicoconecta-a507d.firebaseapp.com",
  projectId: "psicoconecta-a507d",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
</script>

<script>

// ================= PREGUNTAS PACIENTE =================
const preguntas = [
    { q: "¿Cómo prefieres tomar terapia?", opts: ["Presencial", "En línea", "Me da igual"] },
    { q: "¿Qué tan lejos estarías dispuesto a atenderte?", opts: ["Solo en mi ciudad", "En cualquier lugar del país", "En cualquier parte del mundo"] },
    { q: "¿Para quién es la terapia?", opts: ["Niño o adolescente", "Adulto o adulto mayor", "Grupo de distintas edades"] },
    { q: "Tipo de terapia que buscas", opts: ["Individual", "Pareja o familiar", "Grupal"] },
    { q: "Motivo principal de consulta", opts: ["Ansiedad, depresión, regulación emocional, duelo", "Evaluación y terapia neuropsicológica", "Trastornos conductuales o de personalidad"] },
    { q: "¿Cómo te gustaría que fuera la terapia?", opts: ["Con ejercicios y tareas prácticas", "Mezcla de conversación y herramientas", "Conversación profunda y reflexión"] },
    { q: "¿Qué tipo de enfoque te gustaría más?", opts: ["Que me enseñe estrategias para cambiar pensamientos, hábitos y dinámicas, enfocado en soluciones", "Que me ayude a aumentar la conciencia, la aceptación y el crecimiento personal", "Que exploremos mi historia personal y patrones relacionales"] },
    { q: "¿Qué estilo prefieres en tu terapeuta?", opts: ["Directo y orientado a soluciones", "Colaborativo", "Más reflexivo"] },
    { q: "¿Qué esperas principalmente del terapeuta?", opts: ["Herramientas prácticas", "Escucha y comprensión", "Análisis profundo de mis patrones"] },
    { q: "¿Te gustaría que tu terapia incluya elementos relacionados con alguna religión o espiritualidad?", opts: ["No, prefiero una terapia sin enfoque religioso", "Podría estar bien si se usan elementos espirituales de forma general", "Sí, me gustaría que la terapia incluya mi religión o creencias espirituales"], special: "religion" },
    { q: "¿Cuánto tiempo crees que necesitarás terapia?", opts: ["Pocas sesiones", "Algunos meses", "Proceso largo"] },
    { q: "¿Con qué frecuencia te gustaría tener sesiones?", opts: ["Cada semana", "Cada 15 días", "Flexible"] },
    { q: "Preferencia de género del terapeuta", opts: ["Mujer", "Hombre", "Indistinto"] },
    { q: "¿Te gustaría que tu terapeuta tome en cuenta alguno de estos aspectos?", opts: ["Prefiero una terapia enfocada principalmente en herramientas psicológicas clínicas", "Me gustaría que el terapeuta también considere mi contexto cultural o social", "Me gustaría que el terapeuta pueda integrar mis creencias espirituales o religiosas"] },
    { q: "¿En qué horario puedes tomar terapia?", opts: ["Mañana", "Tarde", "Noche o fines de semana"] },
    { q: "¿Cuál es tu presupuesto por sesión?", opts: ["Menos de $500", "$500–$1,000", "Más de $700"] },
    { q: "¿Te importa la experiencia del terapeuta?", opts: ["No mucho", "Algo", "Mucho"] },
    { q: "¿Qué nivel de formación prefieres en tu terapeuta?", opts: ["Licenciatura", "Maestría", "Doctorado o especialización avanzada"] },
    { q: "¿Te interesan otras actividades además de terapia individual?", opts: ["No", "Tal vez talleres o grupos", "Sí, ambas"] },
    { q: "¿Qué tan pronto necesitas empezar terapia?", opts: ["Puedo esperar", "Pronto", "Lo antes posible"] }
];

// ================= PREGUNTAS PSICÓLOGO =================
const preguntasPsi = [
    { q: "Modalidad de atención que ofreces principalmente", opts: ["Presencial", "En línea", "Híbrida (ambas)"] },
    { q: "Ubicación o alcance geográfico", opts: ["Local", "Nacional", "Internacional"] },
    { q: "Población con la que trabajas principalmente", opts: ["Niños/adolescentes", "Adultos/Adultos mayores", "Todas las edades"] },
    { q: "Tipo de terapia que ofreces", opts: ["Individual", "Pareja/familiar", "Grupal"] },
    { q: "Áreas principales de atención", opts: ["Ansiedad, depresión, regulación emocional, duelo", "Evaluación y terapia neuropsicológica", "Trastornos conductuales o de personalidad"] },
    { q: "Nivel de estructura de tu terapia", opts: ["Muy estructurada con tareas y ejercicios", "Moderadamente estructurada", "Más reflexiva y exploratoria"] },
    { q: "Enfoque terapéutico predominante", opts: ["TCC, Breve o Sistémica", "Humanista o Contextual (ACT, DBT, FAP, AC, Mindfulness)", "Psicoanálisis o Psicodinámica"] },
    { q: "Estilo de intervención", opts: ["Directivo (orientación clara y estrategias)", "Colaborativo", "Exploratorio"] },
    { q: "Rol del terapeuta en sesión", opts: ["Enseñar herramientas prácticas", "Escuchar y reflexionar juntos", "Analizar patrones profundos"] },
    { q: "¿Tu práctica clínica integra alguna religión o creencia?", opts: ["No, mi práctica es completamente secular", "Sí, integro principios espirituales de manera general cuando el paciente lo solicita", "Sí, mi práctica se basa o se inspira en una tradición religiosa específica"], special: "religion" },
    { q: "Duración promedio del proceso", opts: ["Corto plazo (1–3 meses)", "Mediano plazo (3–12 meses)", "Largo plazo"] },
    { q: "Frecuencia recomendada", opts: ["Semanal", "Quincenal", "Flexible"] },
    { q: "Género de pacientes con los que te especializas", opts: ["Mujeres", "Hombres", "Indistinto"] },
    { q: "Enfoque cultural o social en tu práctica", opts: ["Enfoque general clínico", "Enfoque con sensibilidad cultural y social", "Enfoque que integra valores religiosos o espirituales"] },
    { q: "Horarios de atención", opts: ["Mañana", "Tarde", "Noche/fines de semana"] },
    { q: "Costo por sesión", opts: ["Menos de $500 MXN", "$500–$1,000 MXN", "Más de $1,000 MXN"] },
    { q: "Experiencia profesional", opts: ["1–3 años", "4–10 años", "Más de 10 años"] },
    { q: "Nivel de especialización", opts: ["Licenciatura", "Maestría o especialidad", "Doctorado o certificaciones avanzadas"] },
    { q: "Modalidades adicionales", opts: ["Solo sesiones individuales", "Talleres o grupos", "Ambas"] },
    { q: "Disponibilidad para nuevos pacientes", opts: ["Limitada", "Moderada", "Alta"] }
];

// ================= ESTADO PACIENTE =================
let current = 0;
let respuestas = [];

// ================= ESTADO PSICÓLOGO =================
let currentPsi = 0;
let respuestasPsi = [];

// ================= NAVEGACIÓN =================
function showPsiRegistro() {
    document.getElementById("step1").style.display = "none";
    document.getElementById("step1_psi").style.display = "block";
}

function showStep1() {
    document.getElementById("step1_psi").style.display = "none";
    document.getElementById("step1").style.display = "block";
}

// ================= LOGIN PACIENTE =================
async function login() {
    const correo   = document.getElementById("correo").value;
    const password = document.getElementById("password").value;
    if (!correo || !password) { alert("Ingresa correo y contraseña"); return; }
    try {
        await auth.signInWithEmailAndPassword(correo, password);
        window.location.href = "dashboard.html";
    } catch (error) {
        alert("Error: " + error.message);
    }
}

// ================= LOGIN PSICÓLOGO =================
async function loginPsi() {
    const correo   = document.getElementById("psi_correo").value;
    const password = document.getElementById("psi_password").value;
    if (!correo || !password) { alert("Ingresa correo y contraseña"); return; }
    try {
        await auth.signInWithEmailAndPassword(correo, password);
        window.location.href = "dashboard.html";
    } catch (error) {
        alert("Error: " + error.message);
    }
}

// ================= REGISTRO PACIENTE =================
async function startQuiz() {
    const nombre   = document.getElementById("nombre").value;
    const apellido = document.getElementById("apellido").value;
    const correo   = document.getElementById("correo").value;
    const password = document.getElementById("password").value;

    if (!nombre || !apellido || !correo || !password) {
        alert("Completa todos los campos");
        return;
    }

    respuestas = [];
    current    = 0;

    try {
        await auth.createUserWithEmailAndPassword(correo, password);
        document.getElementById("step1").style.display = "none";
        document.getElementById("step2").style.display = "block";
        showQuestion();
    } catch (error) {
        alert(error.message);
    }
}

// ================= QUIZ PACIENTE =================
function showQuestion() {
    const q = preguntas[current];
    document.getElementById("question").innerText = (current + 1) + "/20 - " + q.q;

    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";
    document.getElementById("religion_sub").style.display = "none";

    q.opts.forEach(opt => {
        const btn = document.createElement("button");
        btn.innerText = opt;
        btn.style.display = "block";
        btn.style.marginBottom = "8px";
        btn.onclick = () => {
            if (q.special === "religion" && opt === q.opts[2]) {
                document.getElementById("religion_sub").style.display = "block";
            } else {
                nextQuestion(opt);
            }
        };
        optionsDiv.appendChild(btn);
    });
}

function confirmarReligionPaciente() {
    const religion = document.getElementById("religion_select").value;
    nextQuestion("Sí, integra creencia: " + religion);
}

function nextQuestion(answer) {
    respuestas.push(answer);
    document.getElementById("religion_sub").style.display = "none";
    if (current < preguntas.length - 1) {
        current++;
        showQuestion();
    } else {
        finish();
    }
}

function prevQuestion() {
    if (current > 0) {
        current--;
        respuestas.pop();
        showQuestion();
    }
}

// ================= REGISTRO PSICÓLOGO =================
async function startQuizPsi() {
    const nombre      = document.getElementById("psi_nombre").value;
    const apellido    = document.getElementById("psi_apellido").value;
    const correo      = document.getElementById("psi_correo").value;
    const password    = document.getElementById("psi_password").value;
    const cedula      = document.getElementById("psi_cedula").value;
    const enfoque     = document.getElementById("psi_enfoque").value;
    const consultorio = document.getElementById("psi_consultorio").value;

    if (!nombre || !apellido || !correo || !password || !cedula || !enfoque || !consultorio) {
        alert("Completa todos los campos");
        return;
    }

    respuestasPsi = [];
    currentPsi    = 0;

    try {
        await auth.createUserWithEmailAndPassword(correo, password);
        document.getElementById("step1_psi").style.display = "none";
        document.getElementById("step2_psi").style.display = "block";
        showPsiQuestion();
    } catch (error) {
        alert(error.message);
    }
}

// ================= QUIZ PSICÓLOGO =================
function showPsiQuestion() {
    const q = preguntasPsi[currentPsi];
    document.getElementById("psi_question").innerText = (currentPsi + 1) + "/20 - " + q.q;

    const optionsDiv = document.getElementById("psi_options");
    optionsDiv.innerHTML = "";
    document.getElementById("psi_religion_sub").style.display = "none";

    q.opts.forEach(opt => {
        const btn = document.createElement("button");
        btn.innerText = opt;
        btn.style.display = "block";
        btn.style.marginBottom = "8px";
        btn.onclick = () => {
            if (q.special === "religion" && opt === q.opts[2]) {
                document.getElementById("psi_religion_sub").style.display = "block";
            } else {
                nextPsiQuestion(opt);
            }
        };
        optionsDiv.appendChild(btn);
    });
}

function confirmarReligionPsi() {
    const religion = document.getElementById("psi_religion_select").value;
    nextPsiQuestion("Sí, práctica basada en tradición: " + religion);
}

function nextPsiQuestion(answer) {
    respuestasPsi.push(answer);
    document.getElementById("psi_religion_sub").style.display = "none";
    if (currentPsi < preguntasPsi.length - 1) {
        currentPsi++;
        showPsiQuestion();
    } else {
        finishPsi();
    }
}

function prevPsiQuestion() {
    if (currentPsi > 0) {
        currentPsi--;
        respuestasPsi.pop();
        showPsiQuestion();
    }
}

// ================= FINAL PACIENTE =================
async function finish() {
    const user = auth.currentUser;
    if (!user) return alert("Error: usuario no autenticado");

    const nombreCompleto =
        document.getElementById("nombre").value + " " +
        document.getElementById("apellido").value;

    try {
        await db.collection("usuarios").doc(user.uid).set({
            tipo: "paciente",
            email: user.email,
            nombre: nombreCompleto,
            ubicacion: document.getElementById("ubicacion").value,
            motivo: document.getElementById("motivo").value,
            respuestas: respuestas,
            fecha: new Date()
        });

        document.getElementById("step2").style.display = "none";
        document.getElementById("final").style.display = "block";
    } catch (error) {
        console.log(error);
        alert("Error guardando datos");
    }
}

// ================= FINAL PSICÓLOGO =================
async function finishPsi() {
    const user = auth.currentUser;
    if (!user) return alert("Error: usuario no autenticado");

    const nombreCompleto =
        document.getElementById("psi_nombre").value + " " +
        document.getElementById("psi_apellido").value;

    try {
        await db.collection("psicologos").doc(user.uid).set({
            tipo: "psicologo",
            email: user.email,
            nombre: nombreCompleto,
            cedula: document.getElementById("psi_cedula").value,
            enfoque: document.getElementById("psi_enfoque").value,
            consultorio: document.getElementById("psi_consultorio").value,
            respuestas: respuestasPsi,
            fecha: new Date()
        });

        document.getElementById("step2_psi").style.display = "none";
        document.getElementById("final").style.display = "block";
    } catch (error) {
        console.log(error);
        alert("Error guardando datos");
    }
}

// ================= DASHBOARD =================
function goHome() {
    window.location.href = "dashboard.html";
}

</script>

</body>
</html>
